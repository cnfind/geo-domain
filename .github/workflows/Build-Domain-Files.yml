name: Build Domain Files
on:
  workflow_dispatch:
  schedule:
    - cron: "0 18 * * *"
#  push:
#    branches:
#      - main
#    paths-ignore:
#      - ".gitignore"
#      - "LICENSE"
#      - "*.md"

permissions:
  contents: write
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Set variables
        run: |
          echo "update_version=$(date -d '+8 hours' +%Y-%m-%d)" >> ${GITHUB_ENV}
          echo "fakeip=https://raw.githubusercontent.com/cnfind/geo-domain/main/tools/fake_ip_filter.list" >> $GITHUB_ENV
          echo "ads=https://raw.githubusercontent.com/privacy-protection-tools/anti-AD/master/anti-ad-clash.yaml" >> $GITHUB_ENV
          echo "private=https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Lan/Lan.list" >> $GITHUB_ENV
          echo "tracker1=https://raw.githubusercontent.com/XIU2/TrackersListCollection/master/all.txt" >> $GITHUB_ENV
          echo "tracker2=https://raw.githubusercontent.com/ngosang/trackerslist/master/trackers_all.txt" >> $GITHUB_ENV
          echo "applications1=https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Download/Download.list" >> $GITHUB_ENV
          echo "applications2=https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/applications.txt" >> $GITHUB_ENV
          echo "apple=https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Apple/Apple.list" >> $GITHUB_ENV
          echo "apple_cn=https://raw.githubusercontent.com/felixonmars/dnsmasq-china-list/master/apple.china.conf" >> $GITHUB_ENV
          echo "google_cn=https://raw.githubusercontent.com/felixonmars/dnsmasq-china-list/master/google.china.conf" >> $GITHUB_ENV
          echo "games_cn1=https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Game/GameDownloadCN/GameDownloadCN.list" >> $GITHUB_ENV
          echo "games_cn2=https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/SteamCN/SteamCN.list" >> $GITHUB_ENV
          echo "games1=https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Game/Game.list" >> $GITHUB_ENV
          echo "games2=https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Game/GameDownload/GameDownload.list" >> $GITHUB_ENV
          echo "netflix=https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Netflix/Netflix.list" >> $GITHUB_ENV
          echo "disney=https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Disney/Disney.list" >> $GITHUB_ENV
          echo "max=https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/HBO/HBO.list" >> $GITHUB_ENV
          echo "primevideo=https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/PrimeVideo/PrimeVideo.list" >> $GITHUB_ENV
          echo "appletv=https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/AppleTV/AppleTV.list" >> $GITHUB_ENV
          echo "youtube=https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/YouTube/YouTube.list" >> $GITHUB_ENV
          echo "tiktok=https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/TikTok/TikTok.list" >> $GITHUB_ENV
          echo "bilibili=https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/BiliBili/BiliBili.list" >> $GITHUB_ENV
          echo "spotify=https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Spotify/Spotify.list" >> $GITHUB_ENV
          echo "media=https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/GlobalMedia/GlobalMedia.list" >> $GITHUB_ENV
          echo "ai=https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/AI.list" >> $GITHUB_ENV
          echo "speedtest=https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Speedtest/Speedtest.list" >> $GITHUB_ENV
          echo "cn1=https://raw.githubusercontent.com/felixonmars/dnsmasq-china-list/master/accelerated-domains.china.conf" >> $GITHUB_ENV
          echo "cn2=https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/China/China.list" >> $GITHUB_ENV
        shell: bash

      - name: Checkout codebase
        uses: actions/checkout@main

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: ./go.mod

      - name: Checkout `v2fly/domain-list-community`
        uses: actions/checkout@v6
        with:
          repository: v2fly/domain-list-community
          path: community

      - name: Checkout `cokebar/gfwlist2dnsmasq`
        uses: actions/checkout@v6
        with:
          repository: cokebar/gfwlist2dnsmasq
          path: gfwlist2dnsmasq

      - name: Generate `mihomo` geosite.dat and domains (.txt files)
        run: |
          go run ./ --datapath=./community/data/

      - name: Ready for remove redundant rules (`games-cn`, `games`, `media`, `ai`, `proxy`, `cn`, `cn-lite`)
        run: |
          mkdir -p ./tmp/ ./domains/
          chmod +x ./tools/*.py ./tools/filter.sh

          # suffix for `games-cn`
          cat ./publish/category-enhance-gaming.txt | perl -ne '/^(domain):([^:]+):\@cn$/ && print "$2\n"' > ./tmp/temp-games-cn-unsort-suffix.txt
          cat ./publish/category-game-accelerator-cn.txt | perl -ne '/^(domain):([^:]+)(\n$|:\@.+)/ && print "$2\n"' >> ./tmp/temp-games-cn-unsort-suffix.txt
          cat ./publish/category-game-platforms-download.txt | perl -ne '/^(domain):([^:]+):\@cn$/ && print "$2\n"' >> ./tmp/temp-games-cn-unsort-suffix.txt
          cat ./publish/category-games-cn.txt | perl -ne '/^(domain):([^:]+)(\n$|:\@.+)/ && print "$2\n"' >> ./tmp/temp-games-cn-unsort-suffix.txt
          curl -sSL ${games_cn1} | awk '/DOMAIN-SUFFIX,/' | sed 's/DOMAIN-SUFFIX,//' >> ./tmp/temp-games-cn-unsort-suffix.txt
          curl -sSL ${games_cn2} | awk '/DOMAIN-SUFFIX,/' | sed 's/DOMAIN-SUFFIX,//' >> ./tmp/temp-games-cn-unsort-suffix.txt
          sort --ignore-case -u ./tmp/temp-games-cn-unsort-suffix.txt > ./tmp/temp-games-cn-sort-suffix.txt

          # domain for `games-cn`
          cat ./publish/category-enhance-gaming.txt | perl -ne '/^(full):([^:]+):\@cn$/ && print "$2\n"' > ./tmp/temp-games-cn-unsort-domain.txt
          cat ./publish/category-game-accelerator-cn.txt | perl -ne '/^(full):([^:]+)(\n$|:\@.+)/ && print "$2\n"' >> ./tmp/temp-games-cn-unsort-domain.txt
          cat ./publish/category-game-platforms-download.txt | perl -ne '/^(full):([^:]+):\@cn$/ && print "$2\n"' >> ./tmp/temp-games-cn-unsort-domain.txt
          cat ./publish/category-games-cn.txt | perl -ne '/^(full):([^:]+)(\n$|:\@.+)/ && print "$2\n"' >> ./tmp/temp-games-cn-unsort-domain.txt
          curl -sSL ${games_cn1} | awk '/DOMAIN,/' | sed 's/DOMAIN,//' >> ./tmp/temp-games-cn-unsort-domain.txt
          curl -sSL ${games_cn2} | awk '/DOMAIN,/' | sed 's/DOMAIN,//' >> ./tmp/temp-games-cn-unsort-domain.txt
          sort --ignore-case -u ./tmp/temp-games-cn-unsort-domain.txt > ./tmp/temp-games-cn-sort-domain.txt

          # keyword for `games-cn`
          cat ./publish/category-enhance-gaming.txt | perl -ne '/^(keyword):([^:]+):\@cn$/ && print "$2\n"' > ./tmp/temp-games-cn-unsort-keyword.txt
          cat ./publish/category-game-accelerator-cn.txt | perl -ne '/^(keyword):([^:]+)(\n$|:\@.+)/ && print "$2\n"' >> ./tmp/temp-games-cn-unsort-keyword.txt
          cat ./publish/category-game-platforms-download.txt | perl -ne '/^(keyword):([^:]+):\@cn$/ && print "$2\n"' >> ./tmp/temp-games-cn-unsort-keyword.txt
          cat ./publish/category-games-cn.txt | perl -ne '/^(keyword):([^:]+)(\n$|:\@.+)/ && print "$2\n"' >> ./tmp/temp-games-cn-unsort-keyword.txt
          curl -sSL ${games_cn1} | awk '/DOMAIN-KEYWORD,/' | sed 's/DOMAIN-KEYWORD,//' >> ./tmp/temp-games-cn-unsort-keyword.txt
          curl -sSL ${games_cn2} | awk '/DOMAIN-KEYWORD,/' | sed 's/DOMAIN-KEYWORD,//' >> ./tmp/temp-games-cn-unsort-keyword.txt
          sort --ignore-case -u ./tmp/temp-games-cn-unsort-keyword.txt > ./tmp/temp-games-cn-sort-keyword.txt

          # suffix for `games`
          cat ./publish/category-enhance-gaming.txt | perl -ne '/^(domain):([^:]+)(\n$|:\@!cn$)/ && print "$2\n"' > ./tmp/temp-games-unsort-suffix.txt
          cat ./publish/category-game-platforms-download.txt | perl -ne '/^(domain):([^:]+)(\n$|:\@!cn$)/ && print "$2\n"' >> ./tmp/temp-games-unsort-suffix.txt
          cat ./publish/category-games-\!cn.txt | perl -ne '/^(domain):([^:]+)(\n$|:\@.+)/ && print "$2\n"' >> ./tmp/temp-games-unsort-suffix.txt
          curl -sSL ${games1} | awk '/DOMAIN-SUFFIX,/' | sed 's/DOMAIN-SUFFIX,//' >> ./tmp/temp-games-unsort-suffix.txt
          curl -sSL ${games2} | awk '/DOMAIN-SUFFIX,/' | sed 's/DOMAIN-SUFFIX,//' >> ./tmp/temp-games-unsort-suffix.txt
          sort --ignore-case -u ./tmp/temp-games-unsort-suffix.txt > ./tmp/temp-games-sort-suffix.txt

          # domain for `games`
          cat ./publish/category-enhance-gaming.txt | perl -ne '/^(full):([^:]+)(\n$|:\@!cn$)/ && print "$2\n"' > ./tmp/temp-games-unsort-domain.txt
          cat ./publish/category-game-platforms-download.txt | perl -ne '/^(full):([^:]+)(\n$|:\@!cn$)/ && print "$2\n"' >> ./tmp/temp-games-unsort-domain.txt
          cat ./publish/category-games-\!cn.txt | perl -ne '/^(full):([^:]+)(\n$|:\@.+)/ && print "$2\n"' >> ./tmp/temp-games-unsort-domain.txt
          curl -sSL ${games1} | awk '/DOMAIN,/' | sed 's/DOMAIN,//' >> ./tmp/temp-games-unsort-domain.txt
          curl -sSL ${games2} | awk '/DOMAIN,/' | sed 's/DOMAIN,//' >> ./tmp/temp-games-unsort-domain.txt
          sort --ignore-case -u ./tmp/temp-games-unsort-domain.txt > ./tmp/temp-games-sort-domain.txt

          # keyword for `games`
          cat ./publish/category-enhance-gaming.txt | perl -ne '/^(keyword):([^:]+)(\n$|:\@!cn$)/ && print "$2\n"' > ./tmp/temp-games-unsort-keyword.txt
          cat ./publish/category-game-platforms-download.txt | perl -ne '/^(keyword):([^:]+)(\n$|:\@!cn$)/ && print "$2\n"' >> ./tmp/temp-games-unsort-keyword.txt
          cat ./publish/category-games-\!cn.txt | perl -ne '/^(keyword):([^:]+)(\n$|:\@.+)/ && print "$2\n"' >> ./tmp/temp-games-unsort-keyword.txt
          curl -sSL ${games1} | awk '/DOMAIN-KEYWORD,/' | sed 's/DOMAIN-KEYWORD,//' >> ./tmp/temp-games-unsort-keyword.txt
          curl -sSL ${games2} | awk '/DOMAIN-KEYWORD,/' | sed 's/DOMAIN-KEYWORD,//' >> ./tmp/temp-games-unsort-keyword.txt
          sort --ignore-case -u ./tmp/temp-games-unsort-keyword.txt > ./tmp/temp-games-sort-keyword.txt

          # suffix for `media`
          curl -sSL ${media} | awk '/DOMAIN-SUFFIX,/' | sed 's/DOMAIN-SUFFIX,//' | sort --ignore-case > ./tmp/temp-media-sort-suffix.txt

          # domain for `media`
          curl -sSL ${media} | awk '/DOMAIN,/' | sed 's/DOMAIN,//' | sort --ignore-case > ./tmp/temp-media-sort-domain.txt

          # keyword for `media`
          curl -sSL ${media} | awk '/DOMAIN-KEYWORD,/' | sed 's/DOMAIN-KEYWORD,//' | sort --ignore-case > ./tmp/temp-media-sort-keyword.txt

          # suffix for `ai`
          cat ./publish/category-ai-\!cn.txt | perl -ne '/^(domain):([^:]+)(\n$|:\@.+)/ && print "$2\n"' > ./tmp/temp-ai-unsort-suffix.txt
          curl -sSL ${ai} | awk '/DOMAIN-SUFFIX,/' | sed 's/DOMAIN-SUFFIX,//' >> ./tmp/temp-ai-unsort-suffix.txt
          sort --ignore-case -u ./tmp/temp-ai-unsort-suffix.txt > ./tmp/temp-ai-sort-suffix.txt

          # domain for `ai`
          cat ./publish/category-ai-\!cn.txt | perl -ne '/^(full):([^:]+)(\n$|:\@.+)/ && print "$2\n"' > ./tmp/temp-ai-unsort-domain.txt
          curl -sSL ${ai} | awk '/DOMAIN,/' | sed 's/DOMAIN,//' >> ./tmp/temp-ai-unsort-domain.txt
          sort --ignore-case -u ./tmp/temp-ai-unsort-domain.txt > ./tmp/temp-ai-sort-domain.txt

          # keyword for `ai`
          cat ./publish/category-ai-\!cn.txt | perl -ne '/^(keyword):([^:]+)(\n$|:\@.+)/ && print "$2\n"' > ./tmp/temp-ai-unsort-keyword.txt
          curl -sSL ${ai} | awk '/DOMAIN-KEYWORD,/' | sed 's/DOMAIN-KEYWORD,//' >> ./tmp/temp-ai-unsort-keyword.txt
          sort --ignore-case -u ./tmp/temp-ai-unsort-keyword.txt > ./tmp/temp-ai-sort-keyword.txt

          # suffix for `proxy`
          chmod +x ./gfwlist2dnsmasq/gfwlist2dnsmasq.sh
          ./gfwlist2dnsmasq/gfwlist2dnsmasq.sh -l -o ./tmp/temp-gfw.txt
          cat ./tmp/temp-gfw.txt | perl -ne '/^((?=^.{3,255})[a-zA-Z0-9][-_a-zA-Z0-9]{0,62}(\.[a-zA-Z0-9][-_a-zA-Z0-9]{0,62})+)/ && print "$1\n"' > ./tmp/temp-proxy-unsort-suffix.txt
          cat ./publish/geolocation-\!cn.txt | perl -ne '/^(domain):([^:]+)(\n$|:\@.+)/ && print "$2\n"' >> ./tmp/temp-proxy-unsort-suffix.txt
          sort --ignore-case -u ./tmp/temp-proxy-unsort-suffix.txt > ./tmp/temp-proxy-sort-suffix.txt

          # domain for `proxy`
          cat ./publish/geolocation-\!cn.txt | perl -ne '/^(full):([^:]+)(\n$|:\@.+)/ && print "$2\n"' | sort --ignore-case > ./tmp/temp-proxy-sort-domain.txt

          # keyword for `proxy`
          cat ./publish/geolocation-\!cn.txt | perl -ne '/^(keyword):([^:]+)(\n$|:\@.+)/ && print "$2\n"' | sort --ignore-case > ./tmp/temp-proxy-sort-keyword.txt

          # suffix for `cn`
          cat ./publish/cn.txt | perl -ne '/^(domain):([^:]+)(\n$|:\@.+)/ && print "$2\n"' > ./tmp/temp-cn-unsort-suffix.txt
          curl -sSL ${cn1} | awk '!/# Disabled/' | perl -ne '/server=\/([^\/]+)/ && print "$1\n"' >> ./tmp/temp-cn-unsort-suffix.txt
          sort --ignore-case -u ./tmp/temp-cn-unsort-suffix.txt > ./tmp/temp-cn-sort-suffix.txt

          # domain for `cn`
          cat ./publish/cn.txt | perl -ne '/^(full):([^:]+)(\n$|:\@.+)/ && print "$2\n"' | sort --ignore-case > ./tmp/temp-cn-sort-domain.txt

          # keyword for `cn`
          cat ./publish/cn.txt | perl -ne '/^(keyword):([^:]+)(\n$|:\@.+)/ && print "$2\n"' | sort --ignore-case > ./tmp/temp-cn-sort-keyword.txt

          # suffix for `cn-lite`
          cat ./publish/cn.txt | perl -ne '/^(domain):([^:]+)(\n$|:\@.+)/ && print "$2\n"' > ./tmp/temp-cn-lite-unsort-suffix.txt
          curl -sSL ${cn2} | awk '/DOMAIN-SUFFIX,/' | sed 's/DOMAIN-SUFFIX,//' >> ./tmp/temp-cn-lite-unsort-suffix.txt
          sort --ignore-case -u ./tmp/temp-cn-lite-unsort-suffix.txt > ./tmp/temp-cn-lite-sort-suffix.txt

          # domain for `cn-lite`
          cat ./publish/cn.txt | perl -ne '/^(full):([^:]+)(\n$|:\@.+)/ && print "$2\n"' > ./tmp/temp-cn-lite-unsort-domain.txt
          curl -sSL ${cn2} | awk '/DOMAIN,/' | sed 's/DOMAIN,//' >> ./tmp/temp-cn-lite-unsort-domain.txt
          sort --ignore-case -u ./tmp/temp-cn-lite-unsort-domain.txt > ./tmp/temp-cn-lite-sort-domain.txt

          # keyword for `cn-lite`
          cat ./publish/cn.txt | perl -ne '/^(keyword):([^:]+)(\n$|:\@.+)/ && print "$2\n"' > ./tmp/temp-cn-lite-unsort-keyword.txt
          curl -sSL ${cn2} | awk '/DOMAIN-KEYWORD,/' | sed 's/DOMAIN-KEYWORD,//' >> ./tmp/temp-cn-lite-unsort-keyword.txt
          sort --ignore-case -u ./tmp/temp-cn-lite-unsort-keyword.txt > ./tmp/temp-cn-lite-sort-keyword.txt

      - name: Generate `fakeip`
        run: |
          curl -sSL ${fakeip} | perl -ne '/^[\+\*]\.([^\*]+)\n$/ && print "$1\n"' | sort --ignore-case > ./tmp/fakeip-suffix.txt

          curl -sSL ${fakeip} | awk '!/[#+* ]/' | sed 's/^/DOMAIN,/' > ./tmp/temp-fakeip-other.txt
          curl -sSL ${fakeip} | awk '/\*/ && !/#/ && !/\./' | sed -e 's/\*/\[\^\.\]\+/g' -e 's/^/DOMAIN-REGEX,\^/; s/$/\$/' >> ./tmp/temp-fakeip-other.txt
          curl -sSL ${fakeip} | awk '!/#/ && (/\.\*/ || / /)' | sed -e 's/ /\\s/g' -e 's/\./\\./g' -e 's/\*/\[\^\.\]\+/g' -e 's/^\+/\.\*/' -e 's/^/DOMAIN-REGEX,\^/; s/$/\$/' >> ./tmp/temp-fakeip-other.txt
          sort --ignore-case ./tmp/temp-fakeip-other.txt > ./tmp/fakeip-other.txt

      - name: Generate `fakeip-lite`
        run: |
          cat <<EOF > ./tmp/temp-fakeip-lite.txt
          DOMAIN,adguardteam.github.io
          DOMAIN,adrules.top
          DOMAIN,anti-ad.net
          DOMAIN,local.adguard.org
          DOMAIN,static.adtidy.org
          EOF
          curl -sSL ${fakeip} | awk '!/[#+* ]/ && /(ntp|stun|time)/' | sed 's/^/DOMAIN,/' >> ./tmp/temp-fakeip-lite.txt
          curl -sSL ${fakeip} | awk '/(ntp|stun|time)/' | perl -ne '/^[\+\*]\.([^\*]+)\n$/ && print "DOMAIN-SUFFIX,$1\n"' >> ./tmp/temp-fakeip-lite.txt
          curl -sSL ${fakeip} | awk '/(ntp|stun|time)/ && /\.\*/' | sed -e 's/\./\\./g' -e 's/\*/\[\^\.\]\+/g' -e 's/^\+/\.\*/' -e 's/^/DOMAIN-REGEX,\^/; s/$/\$/' >> ./tmp/temp-fakeip-lite.txt
          sort --ignore-case ./tmp/temp-fakeip-lite.txt > ./domains/fakeip-lite.list

      - name: Generate `ads`
        run: |
          curl -sSL ${ads} | perl -ne "/'([^']+)'/ && print \"\$1\n\"" | sed 's/^+\./DOMAIN-SUFFIX,/; t; s/^/DOMAIN,/' | sort --ignore-case > ./domains/ads.list

      - name: Generate `private`
        run: |
          cat ./publish/private.txt | perl -ne '/^(domain):([^:]+)(\n$|:\@.+)/ && print "$2\n"' > ./tmp/temp-private-suffix.txt
          curl -sSL ${private} | awk '/DOMAIN-SUFFIX,/' | sed 's/DOMAIN-SUFFIX,//' >> ./tmp/temp-private-suffix.txt
          sort --ignore-case -u ./tmp/temp-private-suffix.txt > ./tmp/private-suffix.txt

          cat <<EOF > ./tmp/temp-private-other.txt
          DOMAIN,board.zash.run.place
          DOMAIN,metacubex.github.io
          DOMAIN,metacubexd.pages.dev
          DOMAIN,yacd.metacubex.one
          DOMAIN,mask.icloud.com
          DOMAIN,mask-h2.icloud.com
          DOMAIN,mask.apple-dns.net
          EOF
          cat ./publish/private.txt | perl -ne '/^(full):([^:]+)(\n$|:\@.+)/ && print "DOMAIN,$2\n"' >> ./tmp/temp-private-other.txt
          cat ./publish/private.txt | perl -ne '/^(keyword):([^:]+)(\n$|:\@.+)/ && print "DOMAIN-KEYWORD,$2\n"' >> ./tmp/temp-private-other.txt
          curl -sSL ${private} | awk '/(DOMAIN,|DOMAIN-KEYWORD,)/' >> ./tmp/temp-private-other.txt
          echo "DOMAIN-REGEX,^[^.]+$" >> ./tmp/temp-private-other.txt
          sort --ignore-case -u ./tmp/temp-private-other.txt > ./tmp/private-other.txt

      - name: Generate `tracker`
        run: |
          curl -sSL ${tracker1} | grep -i '\.[A-Z]' | awk -F '[/:]' '{print $4}' | sed 's/^/DOMAIN,/' > ./tmp/temp-tracker.txt
          curl -sSL ${tracker2} | grep -i '\.[A-Z]' | awk -F '[/:]' '{print $4}' | sed 's/^/DOMAIN,/' >> ./tmp/temp-tracker.txt
          sort --ignore-case -u ./tmp/temp-tracker.txt > ./domains/tracker.list

      - name: Generate `applications`
        run: |
          curl -sSL ${applications1} | awk '/(DOMAIN,|DOMAIN-SUFFIX,|DOMAIN-KEYWORD,|PROCESS-NAME,)/' > ./tmp/temp-applications.txt
          curl -sSL ${applications2} | perl -ne '/^\s*-\s+(.*)/ && print "$1\n"' >> ./tmp/temp-applications.txt
          sort --ignore-case -u ./tmp/temp-applications.txt > ./domains/applications.list

      - name: Generate `microsoft-cn`
        run: |
          cat ./publish/microsoft.txt | perl -ne '/^(domain):([^:]+):\@cn$/ && print "$2\n"' | sort --ignore-case > ./tmp/microsoft-cn-suffix.txt

          cat ./publish/microsoft.txt | perl -ne '/^(full):([^:]+):\@cn$/ && print "DOMAIN,$2\n"' > ./tmp/temp-microsoft-cn-other.txt
          cat ./publish/microsoft.txt | perl -ne '/^(keyword):([^:]+):\@cn$/ && print "DOMAIN-KEYWORD,$2\n"' >> ./tmp/temp-microsoft-cn-other.txt
          sort --ignore-case ./tmp/temp-microsoft-cn-other.txt > ./tmp/microsoft-cn-other.txt

      - name: Generate `apple-cn`
        run: |
          cat ./publish/apple.txt | perl -ne '/^(domain):([^:]+):\@cn$/ && print "$2\n"' > ./tmp/temp-apple-cn-suffix.txt
          curl -sSL ${apple_cn} | awk '!/# Disabled/' | perl -ne '/server=\/([^\/]+)/ && print "$1\n"' >> ./tmp/temp-apple-cn-suffix.txt
          sort --ignore-case -u ./tmp/temp-apple-cn-suffix.txt > ./tmp/apple-cn-suffix.txt

          cat ./publish/apple.txt | perl -ne '/^(full):([^:]+):\@cn$/ && print "DOMAIN,$2\n"' > ./tmp/temp-apple-cn-other.txt
          cat ./publish/apple.txt | perl -ne '/^(keyword):([^:]+):\@cn$/ && print "DOMAIN-KEYWORD,$2\n"' >> ./tmp/temp-apple-cn-other.txt
          sort --ignore-case ./tmp/temp-apple-cn-other.txt > ./tmp/apple-cn-other.txt

      - name: Generate `apple`
        run: |
          cat ./publish/apple.txt | perl -ne '/^(domain):([^:]+)(\n$|:\@.+)/ && print "$2\n"' > ./tmp/temp-apple-suffix.txt
          curl -sSL ${apple} | awk '/DOMAIN-SUFFIX,/' | sed 's/DOMAIN-SUFFIX,//' >> ./tmp/temp-apple-suffix.txt
          sort --ignore-case -u ./tmp/temp-apple-suffix.txt > ./tmp/apple-suffix.txt

          cat ./publish/apple.txt | perl -ne '/^(full):([^:]+)(\n$|:\@.+)/ && print "DOMAIN,$2\n"' > ./tmp/temp-apple-other.txt
          cat ./publish/apple.txt | perl -ne '/^(keyword):([^:]+)(\n$|:\@.+)/ && print "DOMAIN-KEYWORD,$2\n"' >> ./tmp/temp-apple-other.txt
          curl -sSL ${apple} | awk '/(DOMAIN,|DOMAIN-KEYWORD,)/' >> ./tmp/temp-apple-other.txt
          sort --ignore-case -u ./tmp/temp-apple-other.txt > ./tmp/apple-other.txt

      - name: Generate `google-cn`
        run: |
          cat ./publish/google.txt | perl -ne '/^(domain):([^:]+):\@cn$/ && print "$2\n"' > ./tmp/temp-google-cn-suffix.txt
          curl -sSL ${google_cn} | awk '!/# Disabled/' | perl -ne '/server=\/([^\/]+)/ && print "$1\n"' >> ./tmp/temp-google-cn-suffix.txt
